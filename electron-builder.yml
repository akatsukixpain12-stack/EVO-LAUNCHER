appId: 'evolauncher'
productName: 'EVO LAUNCHER'
artifactName: 'EVO-Launcher-Setup-${version}.${ext}'

publish:
  provider: github
  owner: akatsukixpain12-stack
  repo: EVO-LAUNCHER

copyright: 'Copyright © 2024-2026 EVO Launcher'

asar: true
compression: 'normal'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  icon: 'app/assets/images/SealCircle.ico'
  publisherName: 'EVO Launcher Team'
  legalCopyright: 'Copyright © 2024-2026 EVO Launcher'
  target: 
    - target: 'nsis'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: true
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: 'app/assets/images/SealCircle.ico'
  uninstallerIcon: 'app/assets/images/SealCircle.ico'
  uninstallDisplayName: 'EVO LAUNCHER'
  runAfterFinish: true
  createDesktopShortcut: true

# macOS Configuration
mac:
  icon: 'app/assets/images/SealCircle.png'
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  icon: 'app/assets/images/SealCircle.png'
  target: 'AppImage'
  maintainer: 'EVO Launcher'
  vendor: 'EVO Launcher'
  synopsis: 'EVO Launcher â€” Modded Minecraft Launcher'
  description: 'Custom launcher which allows users to join modded servers. All mods, configurations, and updates are handled automatically.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'
