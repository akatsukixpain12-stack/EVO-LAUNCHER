appId: 'evolauncher'
productName: 'EVO LAUNCHER'
artifactName: '${productName}-setup-${version}.${ext}'

copyright: 'Copyright © 2024-2026 EVO LAUNCHER'

asar: true
compression: 'maximum'

files:
  - '!{dist,.gitignore,.vscode,docs,dev-app-update.yml,.nvmrc,eslint.config.mjs}'

extraResources:
  - 'libraries'

# Windows Configuration
win:
  icon: 'app/assets/images/SealCircle.ico'
  target: 
    - target: 'nsis'
      arch: 'x64'
    - target: 'zip'
      arch: 'x64'

# Windows Installer Configuration
nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  installerIcon: 'app/assets/images/SealCircle.ico'
  uninstallerIcon: 'app/assets/images/SealCircle.ico'
  installerHeaderIcon: 'app/assets/images/SealCircle.ico'

# macOS Configuration
mac:
  icon: 'app/assets/images/SealCircle.png'
  target:
    - target: 'dmg'
      arch:
        - 'x64'
        - 'arm64'
  artifactName: '${productName}-setup-${version}-${arch}.${ext}'
  category: 'public.app-category.games'

# Linux Configuration
linux:
  icon: 'app/assets/images/SealCircle.png'
  target: 'AppImage'
  maintainer: 'EVO LAUNCHER'
  vendor: 'EVO LAUNCHER'
  synopsis: 'EVO LAUNCHER — Free Minecraft Launcher'
  description: 'Free Minecraft launcher with Microsoft, Ely.by, and Offline authentication. Built-in mod management, FPS optimization, and modern dark UI.'
  category: 'Game'


directories:
  buildResources: 'build'
  output: 'dist'
