name: Build and Release (Multi-Platform)

on:
  push:
    branches:
      - master

jobs:
  release:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Windows Installer
        run: npm run dist -- -w --x64

  release-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm ci

      - name: Build Android APK
        run: |
          # This assumes you are using a capacitor or cordova wrapper for the APK
          # For now, we will package the web assets for mobile deployment
          npm run build --if-present
          
      # Add your specific APK signing and upload steps here
