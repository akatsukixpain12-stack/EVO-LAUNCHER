name: Python PyInstaller Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-python:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyinstaller minecraft-launcher-lib

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "EVO-Launcher-Python" launcher.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/EVO-Launcher-Python.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}